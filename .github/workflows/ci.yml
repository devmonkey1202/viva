name: web-ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  web:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Verify app
        run: npm run verify
